openapi: 3.1.0

info:
  title: WebCore API
  version: 1.0.0
  description: API для управления Rust сервером через WebCore

servers:
  - url: http://{serverIp}:{port}/{apiPath}
    variables:
      apiPath:
        default: ""
      port:
        default: "28015"
      serverIp:
        default: 127.0.0.1

security:
  - ApiKeyAuth: []
  - BasicAuth: []

paths:
  /events:
    get:
      tags: [Events]
      summary: SSE поток событий
      parameters:
        - in: query
          name: event
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event stream
          content:
            text/event-stream:
              schema:
                type: string

  /logs/general:
    get:
      tags: [Logs]
      summary: Общие логи сервера
      responses:
        "200":
          description: Логи
          content:
            application/json:
              schema:
                type: object
                properties:
                  Log:
                    type: array
                    items:
                      $ref: "#/components/schemas/LogStructure"
                  Error:
                    type: array
                    items:
                      $ref: "#/components/schemas/LogStructure"
                  Warning:
                    type: array
                    items:
                      $ref: "#/components/schemas/LogStructure"

  /logs/plugin:
    get:
      tags: [Logs]
      summary: Логи плагина
      parameters:
        - in: query
          name: name
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Логи плагина
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: array
                  items:
                    $ref: "#/components/schemas/LogStructure"

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

    BasicAuth:
      type: http
      scheme: basic

  schemas:

    LogType:
      type: string

    LogStructure:
      type: object
      required:
        - Prefix
        - Log
        - Date
      properties:
        Date:
          type: string
          format: date-time
        Log:
          type: string
        Prefix:
          $ref: "#/components/schemas/LogType"

    LoginPassword:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
        password:
          type: string

    PlayerStats:
      type: object
      properties:
        BuildingHits:
          type: string
        Deaths:
          type: integer
        EntityHits:
          type: string
        Id:
          type: integer
        Kills:
          type: integer
        Name:
          type: string
        PlayerHits:
          type: string
        Suicides:
          type: integer
        Time:
          type: string

    PlayerExtendedStats:
      type: object
      properties:
        SteamID:
          type: string
        Name:
          type: string
        TimePlayed:
          type: string
        Kills:
          type: integer
        Deaths:
          type: integer
        Suicides:
          type: integer
        Headshots:
          type: integer
        Accuracy:
          type: number
        ResourcesGathered:
          type: integer
        BuildingBlocksPlaced:
          type: integer
        BlueprintsLearned:
          type: integer
        MonumentsVisited:
          type: array
          items:
            type: string

    PlayerListEntry:
      type: object
      properties:
        SteamID:
          type: string
        DisplayName:
          type: string
        Ping:
          type: integer
        Position:
          $ref: "#/components/schemas/Vector3"

    Vector3:
      type: object
      properties:
        x:
          type: number
        y:
          type: number
        z:
          type: number

    ServerInfo:
      type: object
      properties:
        Hostname:
          type: string
        Players:
          type: integer
        MaxPlayers:
          type: integer
        Uptime:
          type: integer
        Map:
          type: string
        Version:
          type: integer

    FileTreeNode:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [file, directory]
        size:
          type: integer
        children:
          type: array
          items:
            $ref: "#/components/schemas/FileTreeNode"

  responses: {}

tags:
  - name: Logs
    description: Логи сервера и плагинов
  - name: Server
    description: Управление сервером
  - name: Players
    description: Игроки и статистика
  - name: Settings
    description: Конфигурации плагинов
  - name: Auth
    description: Авторизация
  - name: Events
    description: SSE события