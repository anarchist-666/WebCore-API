---
LogStructure:
  properties:
    Date:
      format: date-time
      type: string
    Log:
      type: string
    Prefix:
      $ref: '#/components/schemas/LogType'
  required:
    - Prefix
    - Log
    - Date
  type: object
components:
  schemas:
    LogType:
      type: string
    LoginPassword:
      properties:
        login:
          type: string
        password:
          type: string
      required: [ login, password ]
      type: object
    PlayerStats:
      properties:
        BuildingHits:
          type: string
        Deaths:
          type: integer
        EntityHits:
          type: string
        Id:
          format: uint64
          type: integer
        Kills:
          type: integer
        Name:
          type: string
        PlayerHits:
          type: string
        Suicides:
          type: integer
        Time:
          type: string
      type: object
    PlayerExtendedStats:
      properties:
        SteamID:
          type: string
        Name:
          type: string
        TimePlayed:
          type: string
        Kills:
          type: integer
        Deaths:
          type: integer
        Suicides:
          type: integer
        Headshots:
          type: integer
        Accuracy:
          type: number
        ResourcesGathered:
          type: integer
        BuildingBlocksPlaced:
          type: integer
        BlueprintsLearned:
          type: integer
        MonumentsVisited:
          type: array
          items:
            type: string
      type: object
    PlayerListEntry:
      properties:
        SteamID:
          type: string
        OwnerSteamID:
          type: string
        DisplayName:
          type: string
        Ping:
          type: integer
        Address:
          type: string
        EntityId:
          type: integer
        ConnectedSeconds:
          type: integer
        ViolationLevel:
          type: number
        CurrentLevel:
          type: number
        Health:
          type: number
        Position:
          $ref: '#/components/schemas/Vector3'
        IsMuted:
          type: boolean
        TeamID:
          type: integer
      type: object
    Vector3:
      properties:
        x:
          type: number
        y:
          type: number
        z:
          type: number
      type: object
    ServerInfo:
      properties:
        Hostname:
          type: string
        MaxPlayers:
          type: integer
        Players:
          type: integer
        Queued:
          type: integer
        Joining:
          type: integer
        ReservedSlots:
          type: integer
        EntityCount:
          type: integer
        GameTime:
          type: string
        Uptime:
          type: integer
        Map:
          type: string
        Framerate:
          type: number
        Memory:
          type: integer
        MemoryUsageSystem:
          type: integer
        Collections:
          type: integer
        NetworkIn:
          type: integer
        NetworkOut:
          type: integer
        Restarting:
          type: boolean
        SaveCreatedTime:
          type: string
        Version:
          type: integer
        Protocol:
          type: string
      type: object
    FileTreeNode:
      properties:
        name:
          type: string
        type:
          enum: [ file, directory ]
          type: string
        size:
          type: integer
        children:
          type: array
          items:
            $ref: '#/components/schemas/FileTreeNode'
      type: object
    enum:
      - Error
      - Assert
      - Warning
      - Log
      - Exception
  securitySchemes:
    ApiKeyAuth:
      in: header
      name: X-API-Key
      type: apiKey
    BasicAuth:
      scheme: basic
      type: http
info:
  description: API для управления Rust сервером через WebCore
  title: WebCore API
  version: 1.0.0
openapi: 3.1.0
paths:
  # =========================
  # EVENTS (SSE)
  # =========================
  /events:
    get:
      parameters:
        - in: query
          name: event
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            text/event-stream:
              schema:
                type: string
          description: Event stream
      summary: SSE поток событий
      tags: [ Events ]
  
  # =========================
  # LOGS
  # =========================
  /logs/general:
    get:
      responses:
        '200':
          description: Логи
          content:
            application/json:
              schema:
                type: object
                properties:
                  Log:
                    type: array
                    items:
                      $ref: '#/components/schemas/LogStructure'
                  Error:
                    type: array
                    items:
                      $ref: '#/components/schemas/LogStructure'
                  Warning:
                    type: array
                    items:
                      $ref: '#/components/schemas/LogStructure'
      summary: Общие логи сервера
      tags: [ Logs ]
  
  /logs/plugin:
    get:
      parameters:
        - in: query
          name: name
          required: true
          schema:
            type: string
          description: Имя плагина (или 'all' для всех)
      responses:
        '200':
          description: Логи плагина
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: array
                  items:
                    $ref: '#/components/schemas/LogStructure'
      summary: Логи плагина
      tags: [ Logs ]
  
  # =========================
  # PLAYERS
  # =========================
  /players/list:
    get:
      responses:
        '200':
          description: Players list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlayerListEntry'
      summary: Список игроков онлайн
      tags: [ Players ]
  
  /players/stats:
    get:
      parameters:
        - in: header
          name: STEAMID
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerStats'
          description: Player stats
      summary: Базовая статистика игрока
      tags: [ Players ]
  
  /players/stats/extended:
    get:
      parameters:
        - in: header
          name: STEAMID
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerExtendedStats'
          description: Extended player statistics
      summary: Расширенная статистика игрока
      tags: [ Players ]
  
  /players/stats/top:
    get:
      parameters:
        - in: query
          name: category
          required: true
          schema:
            enum: [ kills, deaths, time, headshots, accuracy ]
            type: string
        - in: query
          name: limit
          required: false
          schema:
            default: 10
            maximum: 100
            minimum: 1
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  properties:
                    SteamID:
                      type: string
                    Name:
                      type: string
                    Value:
                      type: number
                  type: object
          description: Top players by category
      summary: Топ игроков по категории
      tags: [ Players ]
  
  # =========================
  # AUTH
  # =========================
  /registrations:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginPassword'
        required: true
      responses:
        '200':
          description: OK
        '400':
          description: Bad Request
      summary: Регистрация логина и пароля WebPanel
      tags: [ Auth ]
  
  # =========================
  # SERVER
  # =========================
  /server/command:
    post:
      parameters:
        - in: header
          name: CMD
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  output:
                    type: string
      summary: Выполнить консольную команду
      tags: [ Server ]
  
  /server/download:
    get:
      parameters:
        - in: header
          name: File-Name
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/octet-stream:
              schema:
                format: binary
                type: string
          description: File
      summary: Скачать файл
      tags: [ Server ]
  
  /server/info:
    get:
      responses:
        '200':
          description: Server info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerInfo'
      summary: Информация о сервере
      tags: [ Server ]
  
  /server/map:
    get:
      responses:
        '200':
          content:
            image/png:
              schema:
                format: binary
                type: string
          description: PNG map
      summary: Карта сервера
      tags: [ Server ]
  
  /server/tree:
    get:
      responses:
        '200':
          description: Tree
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileTreeNode'
      summary: Файловое дерево сервера
      tags: [ Server ]
  
  /server/upload:
    post:
      parameters:
        - in: header
          name: File-Name
          required: true
          schema:
            type: string
        - in: header
          name: Path
          required: false
          schema:
            type: string
            default: /
      requestBody:
        content:
          application/octet-stream:
            schema:
              format: binary
              type: string
        required: true
      responses:
        '200':
          description: Uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  path:
                    type: string
      summary: Загрузка файла
      tags: [ Server ]
  
  # =========================
  # SETTINGS
  # =========================
  /setting/plugins/list:
    get:
      responses:
        '200':
          description: Plugin list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
      summary: Список плагинов
      tags: [ Settings ]
  
  /setting/plugins/plugin:
    get:
      parameters:
        - in: query
          name: name
          required: true
          schema:
            type: string
        - in: query
          name: format
          required: true
          schema:
            enum: [ json, schema ]
            type: string
      responses:
        '200':
          description: Plugin config
          content:
            application/json:
              schema:
                type: object
      summary: Конфиг плагина
      tags: [ Settings ]
  
  /setting/plugins/save:
    post:
      parameters:
        - in: query
          name: name
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
        required: true
      responses:
        '200':
          description: Saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
      summary: Сохранить конфиг плагина
      tags: [ Settings ]

security:
  - ApiKeyAuth: []
  - BasicAuth: []

servers:
  - url: http://{serverIp}:{port}/{apiPath}
    variables:
      apiPath:
        default: ''
        description: Базовый путь API (из конфига WebCore)
      port:
        default: '28015'
        description: Порт сервера
      serverIp:
        default: 127.0.0.1
        description: IP адрес сервера (например 192.168.1.10 или домен)

tags:
  - description: Логи сервера и плагинов
    name: Logs
  - description: Управление сервером и системные функции
    name: Server
  - description: Игроки и статистика
    name: Players
  - description: Конфигурации плагинов
    name: Settings
  - description: Авторизация
    name: Auth
  - description: SSE события
    name: Events