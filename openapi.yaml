openapi: 3.0.3

info:
  title: WebCore API
  version: 1.0.0
  description: API для управления Rust сервером через WebCore

servers:
  - url: http://{serverIp}:{port}/{apiPath}
    variables:
      serverIp:
        default: 127.0.0.1
        description: IP адрес сервера
      port:
        default: "28015"
        description: Порт сервера
      apiPath:
        default: ""
        description: Базовый путь API

security:
  - ApiKeyAuth: []
  - BasicAuth: []

paths:

  /events:
    get:
      tags: [Events]
      summary: SSE поток событий
      parameters:
        - in: query
          name: event
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event stream
          content:
            text/event-stream:
              schema:
                type: string

  /logs/general:
    get:
      tags: [Logs]
      summary: Общие логи сервера
      responses:
        "200":
          description: Логи
          content:
            application/json:
              schema:
                type: object
                properties:
                  Log:
                    type: array
                    items:
                      $ref: '#/components/schemas/LogStructure'
                  Error:
                    type: array
                    items:
                      $ref: '#/components/schemas/LogStructure'
                  Warning:
                    type: array
                    items:
                      $ref: '#/components/schemas/LogStructure'

  /logs/plugin:
    get:
      tags: [Logs]
      summary: Логи плагина
      parameters:
        - in: query
          name: name
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Логи плагина
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: array
                  items:
                    $ref: '#/components/schemas/LogStructure'

  /players/list:
    get:
      tags: [Players]
      summary: Список игроков онлайн
      responses:
        "200":
          description: Players list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlayerListEntry'

  /players/stats:
    get:
      tags: [Players]
      summary: Базовая статистика игрока
      parameters:
        - in: header
          name: STEAMID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Player stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerStats'

  /players/stats/extended:
    get:
      tags: [Players]
      summary: Расширенная статистика игрока
      parameters:
        - in: header
          name: STEAMID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Extended player stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerExtendedStats'

  /players/stats/top:
    get:
      tags: [Players]
      summary: Топ игроков по категории
      parameters:
        - in: query
          name: category
          required: true
          schema:
            type: string
            enum: [kills, deaths, time, headshots, accuracy]
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        "200":
          description: Top players
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    SteamID:
                      type: string
                    Name:
                      type: string
                    Value:
                      type: number

  /registrations:
    post:
      tags: [Auth]
      summary: Регистрация WebPanel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginPassword'
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request

  /server/command:
    post:
      tags: [Server]
      summary: Выполнить консольную команду
      parameters:
        - in: header
          name: CMD
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  output:
                    type: string

  /server/download:
    get:
      tags: [Server]
      summary: Скачать файл
      parameters:
        - in: header
          name: File-Name
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /server/info:
    get:
      tags: [Server]
      summary: Информация о сервере
      responses:
        "200":
          description: Server info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerInfo'

  /server/map:
    get:
      tags: [Server]
      summary: Карта сервера
      responses:
        "200":
          description: PNG map
          content:
            image/png:
              schema:
                type: string
                format: binary

  /server/tree:
    get:
      tags: [Server]
      summary: Файловое дерево
      responses:
        "200":
          description: Tree
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileTreeNode'

  /server/upload:
    post:
      tags: [Server]
      summary: Загрузка файла
      parameters:
        - in: header
          name: File-Name
          required: true
          schema:
            type: string
        - in: header
          name: Path
          schema:
            type: string
            default: /
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Uploaded

  /setting/plugins/list:
    get:
      tags: [Settings]
      summary: Список плагинов
      responses:
        "200":
          description: Plugin list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /setting/plugins/plugin:
    get:
      tags: [Settings]
      summary: Конфиг плагина
      parameters:
        - in: query
          name: name
          required: true
          schema:
            type: string
        - in: query
          name: format
          required: true
          schema:
            type: string
            enum: [json, schema]
      responses:
        "200":
          description: Plugin config

  /setting/plugins/save:
    post:
      tags: [Settings]
      summary: Сохранить конфиг
      parameters:
        - in: query
          name: name
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Saved

components:

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

    BasicAuth:
      type: http
      scheme: basic

  schemas:

    LogType:
      type: string
      enum: [Error, Assert, Warning, Log, Exception]

    LogStructure:
      type: object
      required: [Prefix, Log, Date]
      properties:
        Date:
          type: string
          format: date-time
        Log:
          type: string
        Prefix:
          $ref: '#/components/schemas/LogType'

    LoginPassword:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
        password:
          type: string

    PlayerStats:
      type: object
      properties:
        BuildingHits: { type: string }
        Deaths: { type: integer }
        EntityHits: { type: string }
        Id:
          type: integer
          format: int64
        Kills: { type: integer }
        Name: { type: string }
        PlayerHits: { type: string }
        Suicides: { type: integer }
        Time: { type: string }

    PlayerExtendedStats:
      type: object
      properties:
        SteamID: { type: string }
        Name: { type: string }
        TimePlayed: { type: string }
        Kills: { type: integer }
        Deaths: { type: integer }
        Suicides: { type: integer }
        Headshots: { type: integer }
        Accuracy: { type: number }
        ResourcesGathered: { type: integer }
        BuildingBlocksPlaced: { type: integer }
        BlueprintsLearned: { type: integer }
        MonumentsVisited:
          type: array
          items: { type: string }

    PlayerListEntry:
      type: object
      properties:
        SteamID: { type: string }
        OwnerSteamID: { type: string }
        DisplayName: { type: string }
        Ping: { type: integer }
        Address: { type: string }
        EntityId: { type: integer }
        ConnectedSeconds: { type: integer }
        ViolationLevel: { type: number }
        CurrentLevel: { type: number }
        Health: { type: number }
        Position:
          $ref: '#/components/schemas/Vector3'
        IsMuted: { type: boolean }
        TeamID: { type: integer }

    Vector3:
      type: object
      properties:
        x: { type: number }
        y: { type: number }
        z: { type: number }

    ServerInfo:
      type: object
      properties:
        Hostname: { type: string }
        MaxPlayers: { type: integer }
        Players: { type: integer }
        Queued: { type: integer }
        Joining: { type: integer }
        ReservedSlots: { type: integer }
        EntityCount: { type: integer }
        GameTime: { type: string }
        Uptime: { type: integer }
        Map: { type: string }
        Framerate: { type: number }
        Memory: { type: integer }
        MemoryUsageSystem: { type: integer }
        Collections: { type: integer }
        NetworkIn: { type: integer }
        NetworkOut: { type: integer }
        Restarting: { type: boolean }
        SaveCreatedTime: { type: string }
        Version: { type: integer }
        Protocol: { type: string }

    FileTreeNode:
      type: object
      properties:
        name: { type: string }
        type:
          type: string
          enum: [file, directory]
        size: { type: integer }
        children:
          type: array
          items:
            $ref: '#/components/schemas/FileTreeNode'

tags:
  - name: Logs
  - name: Server
  - name: Players
  - name: Settings
  - name: Auth
  - name: Events